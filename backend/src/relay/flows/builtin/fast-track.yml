id: fast-track
steps:
  - id: intake
    profession_id: assistant
    gate: auto
    exit: next

  - id: code
    profession_id: coder
    gate: auto
    validators:
      - type: work_product_has_extensions
        content:
          exts:
            - .rs
            - .vue
            - .ts
            - .js
    tool_guard:
      required_first:
        - read_specs
        - read_file
        - list_specs
        - search
      always_allowed:
        - list_symbols
      forbidden:
        - dispatch
        - shell
    exit: next
