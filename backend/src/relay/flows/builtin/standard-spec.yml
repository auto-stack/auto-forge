id: standard-spec-driven-development
steps:
  - id: intake
    profession_id: assistant
    gate: auto
    exit: next

  - id: discover
    profession_id: advisor
    gate: auto
    validators:
      - type: any
        content:
          - type: spec_updates_non_empty
            content:
              sections:
                - goals
          - type: work_product_has_extensions
            content:
              exts:
                - .ad
    tool_guard:
      required_first:
        - write_specs
        - write_goals
      always_allowed:
        - list_specs
        - read_specs
    exit: next

  - id: design
    profession_id: architect
    gate: auto
    validators:
      - type: any
        content:
          - type: spec_updates_non_empty
            content:
              sections:
                - architecture
                - designs
          - type: decisions_non_empty
    tool_guard:
      required_first:
        - update_spec
      always_allowed:
        - list_specs
        - read_specs
        - read_file
        - dispatch
      forbidden:
        - write_specs
    exit: next

  - id: plan
    profession_id: planner
    gate: auto
    validators:
      - type: spec_updates_non_empty
        content:
          sections:
            - plans
    tool_guard:
      required_first:
        - write_specs
        - update_spec
      always_allowed:
        - list_specs
        - read_specs
        - read_file
    exit: next

  - id: draft-tests
    profession_id: tester
    gate: auto
    exit: next

  - id: code
    profession_id: coder
    gate: auto
    validators:
      - type: work_product_has_extensions
        content:
          exts:
            - .rs
            - .vue
            - .ts
            - .js
    tool_guard:
      required_first:
        - read_specs
        - read_file
        - list_specs
        - search
      always_allowed:
        - list_symbols
      forbidden:
        - dispatch
        - shell
    exit: next

  - id: run-tests
    profession_id: tester
    gate: auto
    validators:
      - type: any
        content:
          - type: spec_updates_non_empty
            content:
              sections:
                - tests
          - type: work_product_has_extensions
            content:
              exts:
                - .rs
                - .ts
                - .vue
    exit: !branch
      on: to
      arms:
        reviewer: review
        coder: code
      default: review

  - id: review
    profession_id: reviewer
    gate: auto
    validators:
      - type: any
        content:
          - type: decisions_non_empty
          - type: spec_updates_non_empty
            content:
              sections:
                - reviews
          - type: work_product_has_extensions
            content:
              exts:
                - .md
                - .ad
                - .txt
    tool_guard:
      required_first:
        - write_specs
        - update_spec
        - write_file
        - edit_file
      always_allowed:
        - read_file
        - read_specs
        - list_specs
        - search
        - shell
      forbidden:
        - dispatch
    exit: next

  - id: report
    profession_id: documenter
    gate: auto
    validators:
      - type: any
        content:
          - type: spec_updates_non_empty
            content:
              sections:
                - reports
          - type: work_product_has_extensions
            content:
              exts:
                - .md
                - .ad
    exit: next
